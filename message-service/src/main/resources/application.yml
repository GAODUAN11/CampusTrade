server:
  port: 8084

spring:
  application:
    name: message-service
  datasource:
    url: jdbc:mysql://${CAMPUS_MYSQL_HOST:127.0.0.1}:${CAMPUS_MYSQL_PORT:3306}/campustrade_message?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${CAMPUS_MYSQL_USERNAME:root}
    password: ${CAMPUS_MYSQL_PASSWORD:200662.Gd}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

campus:
  rpc:
    port: 9094
    protocol-version: 1
    serializer: java

management:
  endpoints:
    web:
      exposure:
        include: health,info
